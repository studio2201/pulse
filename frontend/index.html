<!DOCTYPE html>
<html lang="en" class="dark" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_TITLE}}</title>
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <script>
        // Prevent theme flicker by setting theme immediately
        (function() {
            let theme = null;
            if (typeof document !== 'undefined' && document.cookie) {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const c = cookies[i].trim();
                    if (c.startsWith('super_metroid_theme=')) {
                        theme = c.substring('super_metroid_theme='.length);
                        break;
                    }
                }
            }
            if (theme && theme.startsWith('"') && theme.endsWith('"') && theme.length >= 2) {
                theme = theme.slice(1, -1);
            }
            if (!theme) {
                theme = localStorage.getItem('theme') || 'crateria';
                if (theme.startsWith('"') && theme.endsWith('"')) {
                    theme = theme.slice(1, -1);
                }
            }
            document.documentElement.className = theme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Trunk resources -->
    <link data-trunk rel="css" href="../assets/styles.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/components/body.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/themes/themes.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/layout/header.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/pages/print.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/layout/footer.css" />
    <link data-trunk rel="css" href="https://raw.githubusercontent.com/studio2201/shared-assets/master/styles/pages/login.css" />
    <link data-trunk rel="copy-file" href="../assets/favicon.svg" />
    <link data-trunk rel="copy-file" href="../assets/favicon.png" />
    <link data-trunk rel="copy-file" href="../assets/service-worker.js" />
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
</head>
<body class="layout-fit">
    <div id="app"></div>
    <script>
        // Register PWA Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js")
                .then((reg) => console.log("Service Worker registered:", reg.scope))
                .catch((err) => console.log("Service Worker registration failed:", err));
        }
    </script>
</body>
</html>
